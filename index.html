<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>iOS App 上下架监控</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
    body{background:#f5f5f7;padding:20px;max-width:600px;margin:0 auto}
    .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
    h1{font-size:22px;margin-bottom:15px;text-align:center;color:#333}
    .btn-group{display:flex;gap:10px;margin-bottom:10px}
    button{flex:1;height:46px;border:none;border-radius:12px;font-size:15px;color:white;background:#007aff;cursor:pointer}
    .btn-green{background:#34c531}
    .progress{display:none;height:6px;background:#eee;border-radius:3px;margin:10px 0;overflow:hidden}
    .progress-bar{height:100%;width:0%;background:#007aff;border-radius:3px;transition:width 0.3s}
    .stats{text-align:center;font-size:14px;color:#666;padding:10px 0;border-bottom:1px solid #f0f0f0;margin-bottom:10px}
    .online{color:#34c531}
    .offline{color:#ff3b30}
    .app-item{padding:12px 0;border-bottom:1px solid #f8f8f8;display:flex;align-items:center;gap:12px;cursor:pointer}
    .app-icon{width:50px;height:50px;border-radius:10px;background:#f0f0f0;object-fit:cover}
    .app-info{flex:1}
    .app-name{font-size:16px;font-weight:600;margin-bottom:4px;color:#222}
    .app-sub{font-size:12px;color:#888;margin-bottom:2px}
    .status{font-size:12px;padding:4px 8px;border-radius:6px;background:#f0f0f5;color:#666;white-space:nowrap}
    .status.online{background:#e7f7ec;color:#34c531}
    .status.offline{background:#fee;color:#ff3b30}
    .empty{text-align:center;padding:40px;color:#aaa}
    .pagination{display:flex;justify-content:center;gap:6px;margin-top:15px;flex-wrap:wrap}
    .page-btn{padding:6px 12px;background:#f0f0f5;border:none;border-radius:6px;color:#666}
    .page-btn.active{background:#007aff;color:#fff}
    .loading{text-align:center;padding:20px;color:#666}
  </style>
</head>

<body>
<div class="card">
  <h1>iOS App 上下架监控</h1>
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <div class="btn-group">
    <button class="btn-green" onclick="refreshAll()">刷新全部状态</button>
    <button onclick="syncFromMockApi()">🔄 同步数据</button>
  </div>
</div>

<div id="appList" class="card"></div>

<script>
const MOCK_API_URL = "https://69fbeb78fce564e259170a06.mockapi.io/data";
let appList = [];
let currentPage = 1;
const pageSize = 10;
const CONCURRENCY_LIMIT = 3;
const RETRY_TIMES = 2;

// 延迟
function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// 进度条
function setProgress(p) {
  document.querySelector(".progress").style.display = "block";
  document.getElementById("bar").style.width = p + "%";
}

// ✅ 正确的七麦数据跳转链接（修复！能直接打开对应APP）
function openQimai(appId) {
  window.open(`https://www.qimai.cn/app/lookup?id=${appId}&country=cn`, "_blank");
}

// 单个App请求+重试+超时
async function fetchAppInfo(id, retry = 0) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);

  try {
    let res = await fetch(`https://itunes.apple.com/cn/lookup?id=${id}`, { signal: controller.signal });
    clearTimeout(timer);
    let json = await res.json();

    if (json.resultCount > 0) {
      let d = json.results[0];
      return {
        id, online: true,
        name: d.trackName,
        logo: d.artworkUrl512 || d.artworkUrl100,
        genre: d.primaryGenreName,
        releaseDate: new Date(d.releaseDate).toLocaleDateString()
      };
    }
  } catch (e) {
    clearTimeout(timer);
    if (retry < RETRY_TIMES) {
      await delay(600);
      return fetchAppInfo(id, retry + 1);
    }
  }

  // 下架/获取失败：显示 ID - 已下架
  return {
    id, online: false,
    name: `${id} - 已下架`,
    logo: "https://via.placeholder.com/50",
    genre: "未知分类",
    releaseDate: ""
  };
}

// 限制并发批量请求
async function batchFetch(ids) {
  let results = [];
  let idx = 0;
  const total = ids.length;

  async function worker() {
    while (idx < total) {
      let i = idx++;
      results[i] = await fetchAppInfo(ids[i]);
      setProgress((results.filter(Boolean).length / total) * 100);
    }
  }

  await Promise.all(Array(CONCURRENCY_LIMIT).fill(0).map(worker));
  return results;
}

// 同步数据
async function syncFromMockApi() {
  document.getElementById("appList").innerHTML = `<div class="loading">正在加载ID列表...</div>`;
  try {
    let res = await fetch(MOCK_API_URL);
    let ids = await res.json();
    if (!Array.isArray(ids) || ids.length === 0) {
      document.getElementById("appList").innerHTML = `<div class="empty">暂无ID数据</div>`;
      return;
    }

    appList = await batchFetch(ids);
    localStorage.setItem("iosAppData", JSON.stringify(appList));
    renderList();
  } catch (err) {
    document.getElementById("appList").innerHTML = `<div class="empty">同步失败，请稍后重试</div>`;
  }
}

// 刷新全部
async function refreshAll() {
  if (!appList.length) return;
  appList = await batchFetch(appList.map(i => i.id));
  localStorage.setItem("iosAppData", JSON.stringify(appList));
  renderList();
}

// 渲染列表
function renderList() {
  const el = document.getElementById("appList");
  if (!appList.length) {
    el.innerHTML = `<div class="empty">暂无数据</div>`;
    return;
  }

  let online = appList.filter(i => i.online).length;
  let totalPage = Math.ceil(appList.length / pageSize);
  let list = appList.slice((currentPage - 1)*pageSize, currentPage*pageSize);

  let html = `
    <div class="stats">
      总计 ${appList.length} 个｜<span class="online">在线 ${online}</span>｜<span class="offline">下架 ${appList.length - online}</span>
    </div>
  `;

  list.forEach(item => {
    html += `
    <div class="app-item" onclick="openQimai('${item.id}')">
      <img src="${item.logo}" class="app-icon" onerror="this.src='https://via.placeholder.com/50'">
      <div class="app-info">
        <div class="app-name">${item.name}</div>
        <div class="app-sub">分类：${item.genre}</div>
        <div class="app-sub">${item.online ? '上架：' + item.releaseDate : '状态：已下架'}</div>
      </div>
      <span class="status ${item.online ? 'online' : 'offline'}">${item.online ? '在线' : '已下架'}</span>
    </div>`;
  });

  html += `<div class="pagination">`;
  for (let i=1; i<=totalPage; i++) {
    html += `<button class="page-btn ${currentPage===i?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `</div>`;
  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderList();
}

// 页面打开自动同步
window.onload = () => {
  syncFromMockApi();
};
</script>
</body>
</html>
